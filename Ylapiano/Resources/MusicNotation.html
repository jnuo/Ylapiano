<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <script src="abcjs-basic-min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: transparent;
        font-family: -apple-system, sans-serif;
      }
      #paper {
        width: 100%;
        padding: 8px;
        position: relative;
      }
      #audio-controls {
        display: none;
      }
      /* abcjs cursor styling */
      #paper svg .abcjs-cursor {
        stroke: #ff6b00;
        stroke-width: 2px;
      }
      /* Solfege labels under notes — make smaller */
      #paper svg .abcjs-lyric,
      #paper svg text.abcjs-lyric {
        font-size: 10px !important;
      }
      /* Hide tempo marking (Q: display) */
      #paper svg .abcjs-tempo {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="paper"></div>
    <div id="audio-controls"></div>
    <script>
      var visualObj = null;
      var synthControl = null;
      var audioCtx = null;
      var playMetronomeTick = false;
      var metronomeTimer = null;
      var currentBPM = 90;
      var lastLineY = null;

      function renderMusic(abcString) {
        visualObj = ABCJS.renderAbc("paper", abcString, {
          add_classes: true,
          responsive: "resize",
          wrap: {
            minSpacing: 1.0,
            maxSpacing: 1.8,
            preferredMeasuresPerLine: 4,
            targetNewMeasureRatio: 0.5,
          },
          staffwidth: 500,
          paddingleft: 10,
          paddingright: 10,
          paddingtop: 0,
          paddingbottom: 0,
          scale: 1.0,
        })[0];
      }

      // CursorControl: abcjs calls these as it plays
      // https://paulrosen.github.io/abcjs/audio/synthesized-sound.html#cursorcontrol
      var cursorControl = {
        beatSubdivisions: 1,
        onReady: function () {},
        onStart: function () {
          var svg = document.querySelector("#paper svg");
          if (!svg) return;
          // Remove any existing cursor
          var existing = svg.querySelector(".abcjs-cursor");
          if (existing) existing.remove();
          var cursor = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line",
          );
          cursor.setAttribute("class", "abcjs-cursor");
          cursor.setAttributeNS(null, "x1", 0);
          cursor.setAttributeNS(null, "y1", 0);
          cursor.setAttributeNS(null, "x2", 0);
          cursor.setAttributeNS(null, "y2", 0);
          svg.appendChild(cursor);
          lastLineY = null;
          noteIndex = -1;
          startMetronomeTimer();
        },
        onEvent: function (ev) {
          if (ev.measureStart && ev.left === null) return;
          var cursor = document.querySelector("#paper svg .abcjs-cursor");
          if (!cursor) return;
          cursor.setAttribute("x1", ev.left - 2);
          cursor.setAttribute("x2", ev.left - 2);
          cursor.setAttribute("y1", ev.top);
          cursor.setAttribute("y2", ev.top + ev.height);

          // Auto-scroll: snap current line to top when line changes
          var lineNum = ev.line !== undefined ? ev.line : 0;
          if (lastLineY === null || lineNum !== lastLineY) {
            lastLineY = lineNum;
            // Find topmost element on this line via shared .abcjs-l<N> class
            var lineEls = document.querySelectorAll(".abcjs-l" + lineNum);
            var minTop = Infinity;
            for (var i = 0; i < lineEls.length; i++) {
              var r = lineEls[i].getBoundingClientRect();
              if (r.top < minTop) minTop = r.top;
            }
            if (minTop !== Infinity) {
              var scroller =
                document.scrollingElement || document.documentElement;
              var currentScroll = scroller.scrollTop || window.scrollY || 0;
              var targetScroll = currentScroll + minTop - 10;
              if (targetScroll < 0) targetScroll = 0;
              scroller.scrollTop = targetScroll;
              document.documentElement.scrollTop = targetScroll;
              document.body.scrollTop = targetScroll;
              window.scrollTo(0, targetScroll);
            }
          }

          // Notify Swift of note index (increment counter, skip rests)
          if (ev.midiPitches && ev.midiPitches.length > 0) {
            noteIndex++;
            if (
              window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers.noteChange
            ) {
              window.webkit.messageHandlers.noteChange.postMessage({
                index: noteIndex,
              });
            }
          }
        },
        onFinished: function () {
          stopMetronomeTimer();
          var cursor = document.querySelector("#paper svg .abcjs-cursor");
          if (cursor) cursor.remove();
          if (
            window.webkit &&
            window.webkit.messageHandlers &&
            window.webkit.messageHandlers.playbackEnd
          ) {
            window.webkit.messageHandlers.playbackEnd.postMessage({});
          }
        },
      };

      function startMetronomeTimer() {
        stopMetronomeTimer();
        var intervalMs = 60000 / currentBPM;
        // Play first tick immediately
        if (playMetronomeTick) playClick();
        metronomeTimer = setInterval(function () {
          if (playMetronomeTick) playClick();
        }, intervalMs);
      }

      function stopMetronomeTimer() {
        if (metronomeTimer) {
          clearInterval(metronomeTimer);
          metronomeTimer = null;
        }
      }

      function playClick() {
        // Use abcjs's AudioContext — it's already unlocked by user gesture
        var ctx =
          ABCJS.synth.activeAudioContext && ABCJS.synth.activeAudioContext();
        if (!ctx) {
          if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          }
          ctx = audioCtx;
        }
        if (ctx.state === "suspended") {
          ctx.resume();
        }
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = "square";
        osc.frequency.value = 1000;
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.05);
      }

      function startPlayback(bpm, playNotes, metronome) {
        if (!visualObj) return;
        stopPlayback();

        currentBPM = bpm || 90;
        playMetronomeTick = !!metronome;
        var shouldPlayNotes = playNotes !== false;
        lastPlayNotes = shouldPlayNotes;
        lastPlayMetronome = playMetronomeTick;

        if (!ABCJS.synth.supportsAudio()) return;

        synthControl = new ABCJS.synth.SynthController();
        synthControl.load("#audio-controls", cursorControl, {
          displayLoop: false,
          displayRestart: false,
          displayPlay: false,
          displayProgress: false,
          displayWarp: false,
        });

        synthControl
          .setTune(visualObj, false, {
            qpm: currentBPM,
            program: 0,
            midiTranspose: 0,
          })
          .then(function () {
            // Mute synth if notes disabled (but keep cursor/timing running)
            if (
              !shouldPlayNotes &&
              synthControl.synth &&
              synthControl.synth.audioContext
            ) {
              synthControl.synth.audioContext.suspend();
            }
            synthControl.play();
          });
      }

      function stopPlayback() {
        stopMetronomeTimer();
        if (synthControl) {
          synthControl.pause();
          synthControl.restart();
          synthControl = null;
        }
        var cursor = document.querySelector("#paper svg .abcjs-cursor");
        if (cursor) cursor.remove();
      }

      function setMetronomeEnabled(enabled) {
        playMetronomeTick = !!enabled;
      }

      // Track last playback state so setBPM can restart with same settings
      var lastPlayNotes = true;
      var lastPlayMetronome = true;

      function setBPM(newBPM) {
        if (!newBPM) return;
        var wasPlaying = !!synthControl;
        currentBPM = newBPM;
        if (wasPlaying) {
          stopPlayback();
          startPlayback(newBPM, lastPlayNotes, lastPlayMetronome);
        }
      }
    </script>
  </body>
</html>
